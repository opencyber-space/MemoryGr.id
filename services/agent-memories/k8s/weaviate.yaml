# Weaviate standalone — no external dependencies.
# HTTP REST API exposed via NodePort 30880.
# gRPC API exposed via NodePort 30851.
#
# Apply order:
#   kubectl apply -f k8s/pv-pvc.yaml
#   kubectl apply -f k8s/weaviate.yaml

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weaviate
  namespace: agentic-memory
  labels:
    app: weaviate
spec:
  selector:
    matchLabels:
      app: weaviate
  serviceName: weaviate
  replicas: 1
  template:
    metadata:
      labels:
        app: weaviate
    spec:
      containers:
        - name: weaviate
          image: semitechnologies/weaviate:1.25.0
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          env:
            - name: QUERY_DEFAULTS_LIMIT
              value: "25"
            - name: AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED
              value: "true"
            - name: PERSISTENCE_DATA_PATH
              value: /var/lib/weaviate
            - name: DEFAULT_VECTORIZER_MODULE
              value: none
            - name: ENABLE_MODULES
              value: ""
            - name: CLUSTER_HOSTNAME
              value: node1
          readinessProbe:
            httpGet:
              path: /v1/.well-known/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/weaviate
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: weaviate-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: weaviate
  namespace: agentic-memory
spec:
  type: NodePort
  selector:
    app: weaviate
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30880
    - name: grpc
      port: 50051
      targetPort: 50051
      nodePort: 30851
