apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: agentic-memory
type: Opaque
stringData:
  POSTGRES_PASSWORD: api-78374878
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: agentic-memory
  labels:
    app: postgres
spec:
  selector:
    matchLabels:
      app: postgres
  serviceName: postgres
  replicas: 1
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: agent_memory
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - name: pg
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: agentic-memory
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
      nodePort: 30432
