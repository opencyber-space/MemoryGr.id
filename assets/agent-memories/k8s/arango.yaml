
apiVersion: v1
kind: Secret
metadata:
  name: arango-secret
  namespace: agentic-memory
type: Opaque
stringData:
  ARANGO_ROOT_PASSWORD: vnc-demo0543
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: arangodb
  namespace: agentic-memory
  labels:
    app: arangodb
spec:
  selector:
    matchLabels:
      app: arangodb
  serviceName: arangodb
  replicas: 1
  template:
    metadata:
      labels:
        app: arangodb
    spec:
      containers:
        - name: arangodb
          image: arangodb:3.12
          env:
            - name: ARANGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arango-secret
                  key: ARANGO_ROOT_PASSWORD
          ports:
            - name: http
              containerPort: 8529
          readinessProbe:
            tcpSocket:
              port: 8529
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/arangodb3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: arango-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: arangodb
  namespace: agentic-memory
spec:
  type: NodePort
  selector:
    app: arangodb
  ports:
    - name: http
      port: 8529
      targetPort: 8529
      nodePort: 30529
